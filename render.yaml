services:
  - type: web
    name: agriprofile-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: |
      pip install -r requirements/production.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    rootDir: backend
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: agriprofile-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: agriprofile-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: agriprofile-api.onrender.com
      - key: DEBUG
        value: 'False'

  - type: worker
    name: agriprofile-celery
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements/production.txt
    startCommand: celery -A config worker --loglevel=info --concurrency 2
    rootDir: backend
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: agriprofile-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agriprofile-redis
          property: connectionString

  - type: redis
    name: agriprofile-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: agriprofile-db
    region: oregon
    plan: starter
    postgresMajorVersion: "16"
